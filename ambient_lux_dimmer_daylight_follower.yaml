blueprint:
  name: Ambient Lux Dimmer – Daylight Follower
  description: >
    Dims your lights proportionally to the ambient light level measured by a
    light sensor. The brighter it is outside, the brighter your light –
    perfect for ambient lighting, bias lighting, or garden lights that should
    mirror natural daylight.
  domain: automation
  input:
    light_sensor:
      name: Light Sensor
      description: A sensor with device_class illuminance (lux).
      selector:
        entity:
          device_class: illuminance

    target_lights:
      name: Target Lights
      description: One or more lights to control.
      selector:
        target:
          entity:
            domain: light

    max_lux:
      name: Max Lux
      description: Lux value at which brightness is at its maximum.
      default: 3500
      selector:
        number:
          min: 1
          max: 100000
          unit_of_measurement: lx

    min_lux:
      name: Min Lux
      description: Lux value at which brightness is at its minimum.
      default: 100
      selector:
        number:
          min: 0
          max: 100000
          unit_of_measurement: lx

    brightness_at_max_lux:
      name: Brightness at Max Lux
      description: Light brightness (%) when lux ≥ Max Lux.
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

    brightness_at_min_lux:
      name: Brightness at Min Lux
      description: Light brightness (%) when lux ≤ Min Lux.
      default: 10
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"

    transition_time:
      name: Transition Time
      description: Seconds for the light to fade to the new value.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: s

    color_temp:
      name: Color Temperature (optional)
      description: Fixed color temperature in Kelvin. Leave empty to skip.
      default:
      selector:
        number:
          min: 2000
          max: 6500
          unit_of_measurement: K
          mode: slider

    run_conditions:
      name: Run Conditions (optional)
      description: >
        Additional conditions that must be true for the automation to run
        (e.g. only between 07:00–22:00, only when someone is home).
      default: []
      selector:
        condition:

variables:
  _light_sensor: !input light_sensor
  _max_lux: !input max_lux
  _min_lux: !input min_lux
  _bri_max: !input brightness_at_max_lux
  _bri_min: !input brightness_at_min_lux
  _color_temp: !input color_temp
  lux_raw: "{{ states(_light_sensor) | float(0) }}"
  lux: "{{ [_min_lux, [lux_raw, _max_lux] | min] | max }}"
  slope: >
    {{ (_bri_max - _bri_min) / (_max_lux - _min_lux)
       if (_max_lux - _min_lux) != 0 else 0 }}
  brightness: >
    {{ ([_bri_min, [_bri_max, (slope * lux + (_bri_max - slope * _max_lux))]
       | min] | max) | round(0) | int }}

trigger:
  - platform: state
    entity_id: !input light_sensor

condition:
  - condition: and
    conditions: !input run_conditions

action:
  - service: light.turn_on
    target: !input target_lights
    data:
      brightness_pct: "{{ brightness }}"
      transition: !input transition_time
  - if:
      - condition: template
        value_template: "{{ _color_temp is not none and _color_temp != '' }}"
    then:
      - service: light.turn_on
        target: !input target_lights
        data:
          color_temp_kelvin: "{{ _color_temp | int }}"
